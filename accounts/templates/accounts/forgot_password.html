{% extends "accounts/base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block extra_css %}

<style>

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
    }

    .forgot-box{
        background:white;
        padding:30px;
        border-radius:10px;

        width:300px;

        box-shadow:0px 0px 10px gray;
    }

    h2{
        text-align:center;
        margin-bottom:20px;
    }

    input{
        width:100%;
        padding:10px;
        margin-top:5px;
        margin-bottom:15px;
        box-sizing:border-box;
    }

    button{
        width:100%;
        padding:10px;
        background-color:#007bff;
        color:white;
        border:none;
        border-radius:5px;
        cursor:pointer;
    }

    .back-link{
        text-align:center;
        margin-top:15px;
    }

</style>

{% endblock %}

{% block content %}

<div class="forgot-box">

    <h2>Forgot Password</h2>

    <form method="POST">

        {% csrf_token %}

        <label>Email</label>

        <input
            type="email"
            name="email"
            required
        >

        <button type="submit">
            Send Reset Link
        </button>

    </form>

    <div class="back-link">
        <a href="{% url 'login' %}">
            Back to Login
        </a>
    </div>

</div>

{% endblock %}
