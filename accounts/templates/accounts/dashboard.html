{% extends "accounts/base.html" %}

{% block title %}Dashboard{% endblock %}

{% block extra_css %}

<style>

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
    }

    .dashboard-box{
        background:white;
        padding:30px;
        border-radius:10px;

        width:350px;
        text-align:center;

        box-shadow:0px 0px 10px gray;
    }

    h1{
        margin-bottom:20px;
    }

    .btn{
        display:block;
        text-decoration:none;
        color:white;

        padding:10px 20px;

        border-radius:5px;

        margin-top:15px;
    }

    .edit-btn{
        background-color:#007bff;
    }

    .admin-btn{
        background-color:#28a745;
    }

    .logout-btn{
        background-color:#dc3545;
    }

</style>

{% endblock %}

{% block content %}

<div class="dashboard-box">

    <h1>{{ message }}</h1>

    <p>Welcome <b>{{ user.username }}</b></p>

    <p>You have successfully logged in.</p>

    <a href="{% url 'edit_profile' %}" class="btn edit-btn">
        Edit Profile
    </a>

    {% if user.is_superuser %}
        <a href="{% url 'admin_panel' %}" class="btn admin-btn">
            Admin Panel
        </a>
    {% endif %}

    <a href="{% url 'logout' %}" class="btn logout-btn">
        Logout
    </a>

</div>

{% endblock %}
