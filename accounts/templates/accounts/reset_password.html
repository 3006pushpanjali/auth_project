{% extends "accounts/base.html" %}

{% block title %}Reset Password{% endblock %}

{% block extra_css %}

<style>

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
    }

    .reset-box{
        background:white;
        padding:30px;
        border-radius:10px;

        width:300px;

        box-shadow:0px 0px 10px gray;
    }

    h2{
        text-align:center;
        margin-bottom:20px;
    }

    input{
        width:100%;
        padding:10px;
        margin-top:5px;
        margin-bottom:15px;
        box-sizing:border-box;
    }

    button{
        width:100%;
        padding:10px;
        background-color:#007bff;
        color:white;
        border:none;
        border-radius:5px;
        cursor:pointer;
    }

</style>

{% endblock %}

{% block content %}

<div class="reset-box">

    <h2>Reset Password</h2>

    <form method="POST">

        {% csrf_token %}

        <label>New Password</label>

        <input
            type="password"
            name="password"
            required
        >

        <button type="submit">
            Reset Password
        </button>

    </form>

</div>

{% endblock %}
